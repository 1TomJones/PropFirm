<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prop Challenge Simulator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071028;
      --panel: #0d1a39;
      --line: #21325f;
      --text: #e6ecff;
      --muted: #9aabd4;
      --accent: #4b7dff;
      --green: #2dd4bf;
      --red: #f87171;
      --slate: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #10224d 0%, var(--bg) 45%);
      color: var(--text);
    }
    .wrap { max-width: 1200px; margin: 28px auto; padding: 0 16px; }
    h1 { margin: 0 0 8px; font-size: 40px; }
    .subtitle { color: var(--muted); margin: 0 0 20px; }
    .panel {
      background: linear-gradient(180deg, rgba(15,29,63,.9), rgba(8,17,38,.95));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    label { display: block; font-size: 12px; color: var(--muted); }
    input {
      width: 100%; margin-top: 6px; background: #08112b; color: var(--text);
      border: 1px solid #2a3f78; border-radius: 10px; padding: 9px;
    }
    .strategy { margin-top: 12px; color: var(--muted); font-size: 13px; }
    button {
      background: var(--accent); color: white; border: 0; border-radius: 10px;
      padding: 10px 16px; font-weight: 600; cursor: pointer; margin-top: 14px;
    }
    button[disabled] { opacity: 0.7; cursor: not-allowed; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .secondary { background: #334155; }
    .danger { background: #b91c1c; }
    .status-wrap { margin-top: 12px; }
    .progress-track {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      border: 1px solid #2a3f78;
      background: #08112b;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      transition: width .2s ease;
      background: linear-gradient(90deg, #4b7dff, #2dd4bf);
    }
    .status-text { color: var(--muted); font-size: 13px; margin: 8px 0 0; min-height: 18px; }
    .status-text.error { color: #fecaca; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
    .stat {
      background: #091433; border: 1px solid #2a3f78; border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .stat small { color: var(--muted); display: block; }
    .stat strong { font-size: 30px; }
    .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    h3 { margin-top: 0; }
    @media (max-width: 920px) {
      h1 { font-size: 30px; }
      .charts, .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Prop Challenge Simulator</h1>
  <p class="subtitle">Simple Monte Carlo runs with only the essentials.</p>

  <div class="panel">
    <div class="grid">
      <label>Initial Balance
        <input id="initial_balance" type="number" value="100000" min="1">
      </label>
      <label>Success Target (% gain)
        <input id="success_gain_pct" type="number" value="10" step="0.1" min="0.1">
      </label>
      <label>Fail Limit (% loss)
        <input id="fail_loss_pct" type="number" value="6" step="0.1" min="0.1">
      </label>
      <label>Timeout (trades)
        <input id="timeout_trades" type="number" value="100" min="1">
      </label>
      <label>Number of Sims
        <input id="simulations" type="number" value="100" min="1" max="5000">
      </label>
      <label>Win Rate %
        <input id="win_rate" type="number" value="50" step="0.1" min="0" max="100">
      </label>
      <label>Risk:Reward
        <input id="risk_reward" type="number" value="1" step="0.1" min="0.1">
      </label>
      <label>Risk Per Trade (% of initial)
        <input id="risk_per_trade_pct" type="number" value="1" step="0.1" min="0.1" max="100">
      </label>
    </div>

    <p class="strategy">Default strategy assumptions are 50% win rate, 1:1 risk:reward, and 1% risk per trade based on initial balance. Change them if needed.</p>
    <div class="actions">
      <button id="run">Run Simulations</button>
      <button id="cancel" class="danger" hidden>Cancel</button>
      <button id="retry" class="secondary" hidden>Retry</button>
    </div>
    <div class="status-wrap">
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
      <p id="jobStatus" class="status-text"></p>
    </div>

    <div class="stats" id="stats"></div>
    <p class="strategy" id="samplingMeta"></p>
  </div>

  <div class="charts">
    <div class="panel">
      <h3>Simulation Paths</h3>
      <canvas id="paths" height="140"></canvas>
    </div>
    <div class="panel">
      <h3>Outcome Breakdown</h3>
      <canvas id="pie" height="140"></canvas>
    </div>
  </div>
</div>

<script>
let pathChart, pieChart;
let activeJobId = null;
let pollTimer = null;
let cancelSupported = null;
let lastPayload = null;

function setJobStatus(message, isError = false) {
  jobStatus.textContent = message;
  jobStatus.classList.toggle('error', isError);
}

function setProgress(completed, total) {
  const safeTotal = Math.max(0, Number(total) || 0);
  const safeCompleted = Math.max(0, Math.min(Number(completed) || 0, safeTotal || Number(completed) || 0));
  const pct = safeTotal > 0 ? (safeCompleted / safeTotal) * 100 : 0;
  progressFill.style.width = `${pct.toFixed(1)}%`;
  setJobStatus(`Progress: ${safeCompleted} / ${safeTotal} (${pct.toFixed(1)}%)`);
}

function resetActiveJobUi() {
  activeJobId = null;
  if (pollTimer) {
    clearTimeout(pollTimer);
    pollTimer = null;
  }
  run.disabled = false;
  run.textContent = 'Run Simulations';
  cancel.hidden = true;
}

function startJobUi(jobId, total) {
  activeJobId = jobId;
  run.disabled = true;
  run.textContent = 'Running...';
  cancel.hidden = false;
  retry.hidden = true;
  setProgress(0, total);
}

function getPayload() {
  return {
    initial_balance: +initial_balance.value,
    success_gain_pct: +success_gain_pct.value / 100,
    fail_loss_pct: +fail_loss_pct.value / 100,
    timeout_trades: +timeout_trades.value,
    simulations: +simulations.value,
    store_paths: true,
    max_paths_returned: Math.min(+simulations.value, 250),
    path_decimation_step: 1,
    strategy: {
      win_rate: +win_rate.value / 100,
      risk_reward: +risk_reward.value,
      risk_per_trade_pct: +risk_per_trade_pct.value / 100,
    },
  };
}

function shadedColor(outcome, index, total) {
  const t = total <= 1 ? 0.5 : index / (total - 1);
  if (outcome === 'passed') return `hsl(165 70% ${46 + t * 20}%)`;
  if (outcome === 'failed') return `hsl(358 80% ${52 + t * 20}%)`;
  return `hsl(220 16% ${55 + t * 24}%)`;
}

function draw(res) {
  const total = Math.max(1, res.passed + res.failed + res.timeout);
  stats.innerHTML = `
    <div class="stat"><small>Passed</small><strong>${res.passed}</strong><small>${(res.pass_probability * 100).toFixed(1)}%</small></div>
    <div class="stat"><small>Failed</small><strong>${res.failed}</strong><small>${(res.fail_probability * 100).toFixed(1)}%</small></div>
    <div class="stat"><small>Timed Out</small><strong>${res.timeout}</strong><small>${(res.timeout_probability * 100).toFixed(1)}%</small></div>
  `;

  const sampled = res.paths_returned ?? res.sampled_paths.length;
  const totalPaths = res.paths_total ?? (res.passed + res.failed + res.timeout);
  samplingMeta.textContent = sampled < totalPaths
    ? `Displaying ${sampled} sampled path${sampled === 1 ? '' : 's'} out of ${totalPaths} total simulations.`
    : `Displaying all ${totalPaths} simulation paths.`;

  if (pathChart) pathChart.destroy();
  if (pieChart) pieChart.destroy();

  const outcomeIndexes = { passed: 0, failed: 0, timeout: 0 };
  const outcomeTotals = {
    passed: res.path_outcomes.filter(o => o === 'passed').length,
    failed: res.path_outcomes.filter(o => o === 'failed').length,
    timeout: res.path_outcomes.filter(o => o === 'timeout').length,
  };

  const pointRadius = res.sampled_paths.length <= 25 ? 1.8 : res.sampled_paths.length <= 100 ? 1.2 : 0.8;

  const datasets = res.sampled_paths.map((path, i) => {
    const outcome = res.path_outcomes[i];
    const idx = outcomeIndexes[outcome]++;
    return {
      label: `Simulation ${i + 1} (${outcome})`,
      data: path.map((y, x) => ({ x, y })),
      borderColor: shadedColor(outcome, idx, outcomeTotals[outcome]),
      backgroundColor: shadedColor(outcome, idx, outcomeTotals[outcome]),
      borderWidth: 1.15,
      pointRadius,
      pointHoverRadius: 4,
      pointHitRadius: 8,
      fill: false,
      tension: 0,
    };
  });

  const payload = getPayload();
  const successLevel = payload.initial_balance * (1 + payload.success_gain_pct);
  const failLevel = payload.initial_balance * (1 - payload.fail_loss_pct);
  const flattened = res.sampled_paths.flat();
  const minPath = flattened.length ? Math.min(...flattened) : failLevel;
  const maxPath = flattened.length ? Math.max(...flattened) : successLevel;

  pathChart = new Chart(paths, {
    type: 'line',
    data: { datasets },
    options: {
      parsing: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => `Tick ${items[0].parsed.x}`,
            label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString(undefined, { maximumFractionDigits: 2 })}`
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: 'Tick', color: '#9aabd4' },
          ticks: { color: '#c5d2f2', precision: 0 },
          grid: { color: 'rgba(148,163,184,0.08)' }
        },
        y: {
          suggestedMin: Math.min(failLevel, minPath),
          suggestedMax: Math.max(successLevel, maxPath),
          title: { display: true, text: 'Balance', color: '#9aabd4' },
          ticks: { color: '#c5d2f2' },
          grid: { color: 'rgba(148,163,184,0.08)' }
        }
      }
    }
  });

  pieChart = new Chart(pie, {
    type: 'pie',
    data: {
      labels: ['Passed', 'Failed', 'Timed Out'],
      datasets: [{
        data: [res.passed, res.failed, res.timeout],
        backgroundColor: ['#2dd4bf', '#f87171', '#94a3b8'],
        borderColor: '#08112b',
        borderWidth: 2,
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: '#e6ecff' } },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.label}: ${ctx.raw} (${(ctx.raw / total * 100).toFixed(1)}%)`
          }
        }
      }
    }
  });
}

async function pollJobStatus(jobId) {
  try {
    const response = await fetch(`/api/simulate/jobs/${jobId}`);
    if (!response.ok) {
      throw new Error(`Polling failed (${response.status})`);
    }
    const data = await response.json();
    setProgress(data.completed_simulations, data.total_simulations);

    if (data.status === 'completed') {
      resetActiveJobUi();
      retry.hidden = true;
      setJobStatus(`Completed: ${data.completed_simulations} / ${data.total_simulations} (100.0%)`);
      if (data.result) draw(data.result);
      return;
    }

    if (data.status === 'failed') {
      resetActiveJobUi();
      retry.hidden = false;
      setJobStatus(`Simulation failed: ${data.error || 'Unknown error'}`, true);
      return;
    }

    pollTimer = setTimeout(() => pollJobStatus(jobId), 800);
  } catch (error) {
    resetActiveJobUi();
    retry.hidden = false;
    setJobStatus(`Network error while polling: ${error.message}. You can retry.`, true);
  }
}

async function startSimulation(payload) {
  lastPayload = payload;
  try {
    const response = await fetch('/api/simulate/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!response.ok) {
      throw new Error(`Job creation failed (${response.status})`);
    }
    const data = await response.json();
    startJobUi(data.job_id, payload.simulations);
    pollJobStatus(data.job_id);
  } catch (error) {
    resetActiveJobUi();
    retry.hidden = false;
    setJobStatus(`Network error while starting simulation: ${error.message}. You can retry.`, true);
  }
}

run.onclick = async () => {
  if (activeJobId) return;
  await startSimulation(getPayload());
};

retry.onclick = async () => {
  const payload = lastPayload || getPayload();
  await startSimulation(payload);
};

cancel.onclick = async () => {
  if (!activeJobId) return;
  const jobId = activeJobId;
  if (pollTimer) {
    clearTimeout(pollTimer);
    pollTimer = null;
  }

  if (cancelSupported !== false) {
    try {
      const response = await fetch(`/api/simulate/jobs/${jobId}`, { method: 'DELETE' });
      if (response.ok) {
        cancelSupported = true;
        resetActiveJobUi();
        setJobStatus('Canceled active simulation job.');
        return;
      }
      if (response.status === 404 || response.status === 405) {
        cancelSupported = false;
      }
    } catch (_error) {
      cancelSupported = false;
    }
  }

  resetActiveJobUi();
  setJobStatus('Reset active job tracking locally (server-side cancel not supported).');
};

run.click();
</script>
</body>
</html>
