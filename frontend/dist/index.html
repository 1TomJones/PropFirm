<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Monte Carlo Simulator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 0; background: #0b1220; color: #e5e7eb; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 16px; }
    .panel { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; }
    label { display: block; font-size: 12px; color: #9ca3af; }
    input { width: 100%; margin-top: 6px; background: #0f172a; color: #e5e7eb; border: 1px solid #334155; border-radius: 8px; padding: 8px; }
    button { background: #2563eb; color: white; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 12px; }
    .stat { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; text-align: center; }
    .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .charts { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Simple Monte Carlo Simulator</h1>

  <div class="panel">
    <div class="grid">
      <label>Initial Balance<input id="initial_balance" type="number" value="100000"></label>
      <label>Success Gain %<input id="success_gain_pct" type="number" value="10" step="0.1"></label>
      <label>Fail Loss %<input id="fail_loss_pct" type="number" value="6" step="0.1"></label>
      <label>Timeout (Trades)<input id="timeout_trades" type="number" value="100"></label>
      <label>Number of Simulations<input id="simulations" type="number" value="100"></label>
      <label>Win Rate %<input id="win_rate" type="number" value="50" step="0.1"></label>
      <label>Risk Reward<input id="risk_reward" type="number" value="1" step="0.1"></label>
      <label>Random Seed (optional)<input id="seed" type="number" value=""></label>
    </div>
    <button id="run">Run Simulation</button>

    <div class="stats" id="stats"></div>
  </div>

  <div class="charts">
    <div class="panel">
      <h3>Simulation Equity Paths</h3>
      <canvas id="paths" height="140"></canvas>
    </div>
    <div class="panel">
      <h3>Outcomes</h3>
      <canvas id="pie" height="140"></canvas>
    </div>
  </div>
</div>

<script>
let pathChart, pieChart;

function getPayload() {
  return {
    initial_balance: +initial_balance.value,
    success_gain_pct: +success_gain_pct.value / 100,
    fail_loss_pct: +fail_loss_pct.value / 100,
    timeout_trades: +timeout_trades.value,
    simulations: +simulations.value,
    strategy: {
      win_rate: +win_rate.value / 100,
      risk_reward: +risk_reward.value,
    },
    seed: seed.value === '' ? null : +seed.value,
  };
}

function draw(res) {
  stats.innerHTML = `
    <div class="stat"><div>Passed</div><strong>${res.passed}</strong></div>
    <div class="stat"><div>Failed</div><strong>${res.failed}</strong></div>
    <div class="stat"><div>Timed Out</div><strong>${res.timeout}</strong></div>
  `;

  if (pathChart) pathChart.destroy();
  if (pieChart) pieChart.destroy();

  const datasets = res.sampled_paths.map((path, i) => ({
    data: path.map((y, x) => ({ x, y })),
    borderColor: res.path_outcomes[i] === 'passed' ? '#10b981' : (res.path_outcomes[i] === 'failed' ? '#ef4444' : '#94a3b8'),
    borderWidth: 1,
    pointRadius: 0,
    fill: false,
  }));

  pathChart = new Chart(paths, {
    type: 'line',
    data: { datasets },
    options: { plugins: { legend: { display: false } }, parsing: false }
  });

  pieChart = new Chart(pie, {
    type: 'pie',
    data: {
      labels: ['Passed', 'Failed', 'Timed Out'],
      datasets: [{ data: [res.passed, res.failed, res.timeout], backgroundColor: ['#10b981', '#ef4444', '#94a3b8'] }]
    }
  });
}

run.onclick = async () => {
  run.disabled = true;
  run.textContent = 'Running...';
  const response = await fetch('/api/simulate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(getPayload())
  });
  const data = await response.json();
  draw(data);
  run.disabled = false;
  run.textContent = 'Run Simulation';
};

run.click();
</script>
</body>
</html>
