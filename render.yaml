services:
  - type: web
    name: propfirm-dashboard
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip setuptools wheel && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
