services:
  - type: web
    name: propfirm-dashboard-web
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: REDIS_URL
        fromService:
          type: redis
          name: propfirm-dashboard-redis
          property: connectionString

  - type: worker
    name: propfirm-dashboard-worker
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.app.worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: REDIS_URL
        fromService:
          type: redis
          name: propfirm-dashboard-redis
          property: connectionString

  - type: redis
    name: propfirm-dashboard-redis
    plan: free
    ipAllowList: []
